appId: enrichedmarkdown.example
---
- runFlow:
    when:
      true: ${UPDATE_SCREENSHOTS === "true"}
    commands:
      - takeScreenshot:
          path: "${SCREENSHOT_ROOT}/${SCREENSHOT_PREFIX}/screenshots/${maestro.platform}/${SCREENSHOT_NAME}"
          cropOn:
            id: "${ELEMENT_ID}"

- runFlow:
    when:
      true: ${UPDATE_SCREENSHOTS !== "true"}
    commands:
      - assertScreenshot:
          path: "${SCREENSHOT_ROOT}/${SCREENSHOT_PREFIX}/screenshots/${maestro.platform}/${SCREENSHOT_NAME}"
          thresholdPercentage: 100
          cropOn:
             id: "${ELEMENT_ID}"
