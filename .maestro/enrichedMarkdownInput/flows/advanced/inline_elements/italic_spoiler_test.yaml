appId: swmansion.enriched.markdown.example
tags:
  - input
  - advanced
  - inline
  - italic
  - spoiler
---
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- tapOn:
    id: toolbar-italic

- tapOn:
    id: toolbar-spoiler

- runFlow:
    file: '../../../subflows/set_enriched_input_value.yaml'
    env:
      VALUE: "Italic spoiler text"

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'italic_spoiler_input'
