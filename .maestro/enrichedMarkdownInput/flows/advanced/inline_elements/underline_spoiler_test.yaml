appId: swmansion.enriched.markdown.example
tags:
  - input
  - advanced
  - inline
  - spoiler
  - underline
---
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- tapOn:
    id: toolbar-underline

- tapOn:
    id: toolbar-spoiler

- runFlow:
    file: '../../../subflows/set_enriched_input_value.yaml'
    env:
      VALUE: "Underline spoiler text"

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'underline_spoiler_input'
