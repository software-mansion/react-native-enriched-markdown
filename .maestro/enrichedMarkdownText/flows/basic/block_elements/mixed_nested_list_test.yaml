appId: swmansion.enriched.markdown.example
tags:
  - smoke
  - block
  - list
  - text
---
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        - Frontend
          - React
            - Hooks
            - Components
          - Vue
        - Backend
          - Node.js
          - Python
            1. Django
            2. FastAPI

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'mixed_nested_list_display'
