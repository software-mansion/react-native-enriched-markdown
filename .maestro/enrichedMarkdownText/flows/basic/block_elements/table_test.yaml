appId: swmansion.enriched.markdown.example
tags:
  - smoke
  - block
  - table
  - text
---
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        | col1 | col2 | looooooooong col | a |
        | - | -- | -------------------- | -------- |
        | test | of | the | t |
        | the | one | piece is | real
        | third | Row | to test trailing | symbols | |asdf|||||blabla|

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'table_display'
