appId: swmansion.enriched.markdown.example
tags:
  - smoke
  - block
---
# checks the parsing of Markdown unordered lists (- item / * item)
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        - Apples
        - Bananas
        - Mango
        * Dragonfruit
        * Guava
        * Fig

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'unordered_list_display'
