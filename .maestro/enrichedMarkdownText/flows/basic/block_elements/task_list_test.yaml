appId: swmansion.enriched.markdown.example
tags:
  - smoke
  - block
  - task_list
  - text
---
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        - [x] Dice 2 onions, 3 celery stalks, and parsnips
        - [x] Add vegetables to the pot
        - [ ] Add ground pork and beef
        - [ ] Saute for 10 minutes
        - [ ] Pour in passata and simmer for 1 hour
        - [x] Boil spaghetti pasta
        - [ ] Mix everything and serve

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'task_list_display'
