appId: swmansion.enriched.markdown.example
tags:
  - smoke
  - inline
---
# checks the parsing of bold/strong inline markdown (**text**)
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

# underline flag is ON by default; tap to disable it so __text__ renders as bold
- tapOn:
    id: underline-button

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        **Bold text** and normal text and __more bold__.

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'bold_display'
