appId: swmansion.enriched.markdown.example
tags:
  - smoke
  - inline
---
# checks the parsing of italic/emphasis inline markdown (*text*)
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

# underline flag is ON by default; tap to disable it so _text_ renders as italic
- tapOn:
    id: underline-button

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        *Italic text* and normal text and _also italic_.

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'italic_display'
