appId: swmansion.enriched.markdown.example
tags:
  - block
  - advanced
  - image
---
# checks the combination of thematic breaks surrounding a block image
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        Content above the break.

        ---

- tapOn:
    id: insert-image-button

- tapOn:
    id: blur-button

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'thematic_break_image_combo_display'
