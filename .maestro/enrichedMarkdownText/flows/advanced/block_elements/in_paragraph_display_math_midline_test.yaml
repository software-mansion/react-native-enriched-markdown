appId: swmansion.enriched.markdown.example
tags:
  - block
  - advanced
  - math
  - paragraph
  - text
---
# Regression: genuine mid-line display math (text on both sides, same line) is
# NOT promoted to a block — it stays inline in the sentence flow, rendered by the
# inline math fallback renderer rather than being dropped.
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        Inline display math like $$x = y$$ stays in the sentence flow.

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'in_paragraph_display_math_midline_display'
