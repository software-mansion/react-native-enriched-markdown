appId: swmansion.enriched.markdown.example
tags:
  - block
  - advanced
---
# checks the combination of lists and tables (list items adjacent to tabular data)
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        - Option A
        - Option B

        | Option | Score |
        | ------ | ----- |
        | A      | 90    |
        | B      | 75    |

        1. First choice
        2. Second choice

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'list_table_combo_display'
