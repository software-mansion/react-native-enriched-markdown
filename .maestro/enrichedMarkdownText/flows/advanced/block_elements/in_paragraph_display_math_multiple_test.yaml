appId: swmansion.enriched.markdown.example
tags:
  - block
  - advanced
  - math
  - paragraph
  - text
---
# Regression: multiple in-paragraph display math blocks interleaved with text
# lines (no blank lines). Each isolated block is promoted out of the paragraph,
# leaving the surrounding text lines as their own paragraphs above/below.
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        First equation
        $$
        a = 1
        $$
        second equation
        $$
        b = 2
        $$
        and a closing line.

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'in_paragraph_display_math_multiple_display'
