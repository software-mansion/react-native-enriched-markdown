appId: swmansion.enriched.markdown.example
tags:
  - block
  - advanced
---
# checks the combination of paragraphs and tables (text framing a table)
- launchApp

- runFlow:
    file: '../../../../subflows/move_to_playground.yaml'

- runFlow:
    file: '../../../subflows/set_enriched_text_value.yaml'
    env:
      VALUE: |
        Scores from last round:

        | Player | Score |
        | ------ | ----- |
        | Alice  | 42    |
        | Bob    | 37    |

        Alice wins this round.

- runFlow:
    file: '../../../subflows/capture_or_assert_screenshot.yaml'
    env:
      SCREENSHOT_NAME: 'paragraph_table_combo_display'
