name: Prepare PR

# Applies a single `type: *` label based on the PR's conventional-commit
# title prefix (feat/fix/refactor/test/docs/chore/...). Those labels are what
# `.github/release.yml` groups on when you click "Generate release notes".
#
# Uses pull_request_target so it can label PRs opened from forks too. It only
# reads the PR title and manages labels (never checks out or runs PR code), so
# there is no untrusted-code execution risk.
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

concurrency:
  group: prepare-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    if: github.repository == 'software-mansion/react-native-enriched-markdown'
    runs-on: ubuntu-latest
    steps:
      - name: Apply type label from title prefix
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            // conventional-commit prefix -> label metadata
            const MAP = {
              feat:     { name: 'type: feature',  color: 'a2eeef', description: 'New feature' },
              fix:      { name: 'type: fix',      color: 'd73a4a', description: 'Bug fix or improvement' },
              perf:     { name: 'type: fix',      color: 'd73a4a', description: 'Bug fix or improvement' },
              refactor: { name: 'type: refactor', color: 'fbca04', description: 'Code refactor' },
              test:     { name: 'type: test',     color: '0e8a16', description: 'Tests' },
              docs:     { name: 'type: docs',     color: '0075ca', description: 'Documentation' },
              chore:    { name: 'type: chore',    color: 'cfd3d7', description: 'Chore / tooling' },
              build:    { name: 'type: chore',    color: 'cfd3d7', description: 'Chore / tooling' },
              ci:       { name: 'type: chore',    color: 'cfd3d7', description: 'Chore / tooling' },
              style:    { name: 'type: chore',    color: 'cfd3d7', description: 'Chore / tooling' },
            };

            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const title = pr.title || '';

            // e.g. "feat(android): ..." / "fix!: ..." -> "feat" / "fix"
            const m = title.match(/^(\w+)(?:\([^)]*\))?!?:/);
            const type = m ? m[1].toLowerCase() : null;
            const target = type && MAP[type] ? MAP[type] : null;

            const managed = new Set(Object.values(MAP).map((v) => v.name));
            const current = pr.labels.map((l) => l.name);

            // Remove any managed label that isn't the one we want now
            for (const name of current) {
              if (managed.has(name) && (!target || name !== target.name)) {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: pr.number, name,
                }).catch(() => {});
              }
            }

            if (!target) {
              core.info(`No known type prefix in title: "${title}" — no label applied.`);
              return;
            }

            // Ensure the label exists (with a nice color) before adding it
            try {
              await github.rest.issues.getLabel({ owner, repo, name: target.name });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: target.name,
                  color: target.color, description: target.description,
                });
              } else {
                throw e;
              }
            }

            if (!current.includes(target.name)) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr.number, labels: [target.name],
              });
              core.info(`Applied "${target.name}" from prefix "${type}".`);
            } else {
              core.info(`"${target.name}" already present.`);
            }
