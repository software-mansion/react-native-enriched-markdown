name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      react-native: ${{ steps.filter.outputs.react-native }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            react-native:
              - 'packages/react-native-enriched-markdown/**'
              - 'packages/core/**'
              - 'apps/react-native-example/**'
              - 'package.json'
              - 'yarn.lock'
              - '.nvmrc'
              - '.yarnrc.yml'
              - '.github/**'
            android:
              - 'packages/android-enriched-markdown/**'
              - 'packages/core/**'
              - 'apps/android-example/**'
              - 'package.json'
              - 'yarn.lock'
              - '.nvmrc'
              - '.yarnrc.yml'
              - '.github/**'

  rn-lint:
    needs: changes
    if: needs.changes.outputs.react-native == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn typecheck

  rn-build-library:
    needs: changes
    if: needs.changes.outputs.react-native == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build package
        run: yarn prepare

  rn-build-android:
    needs: changes
    if: needs.changes.outputs.react-native == 'true'
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      TURBO_CACHE_DIR: .turbo/android
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build library and generate codegen
        run: yarn prepare

      - name: Cache turborepo for Android
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-${{ hashFiles('yarn.lock', 'packages/react-native-enriched-markdown/android/**', 'packages/react-native-enriched-markdown/src/**', 'packages/core/cpp/**', 'apps/react-native-example/android/**') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android-

      - name: Check turborepo cache for Android
        run: |
          TURBO_CACHE_STATUS=$(yarn turbo run build:android \
            --filter=react-native-enriched-markdown-example \
            --cache-dir="${{ env.TURBO_CACHE_DIR }}" \
            --dry=json | jq -r '.tasks[0].cache.status')

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Setup Android
        if: env.turbo_cache_hit != 1
        uses: ./.github/actions/setup-android
        with:
          gradle-wrapper-properties: apps/react-native-example/android/gradle/wrapper/gradle-wrapper.properties

      - name: Build example for Android
        env:
          JAVA_OPTS: '-XX:MaxHeapSize=6g'
        run: yarn turbo run build:android --cache-dir="${{ env.TURBO_CACHE_DIR }}"

  rn-build-ios:
    needs: changes
    if: needs.changes.outputs.react-native == 'true'
    runs-on: macos-latest
    env:
      TURBO_CACHE_DIR: .turbo/ios
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build library
        run: yarn prepare

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '26.3'

      - name: Reset build folder and pods
        run: rm -rf apps/react-native-example/build apps/react-native-example/ios/Pods apps/react-native-example/ios/Podfile.lock

      - name: Cache turborepo for iOS
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-ios-${{ hashFiles('yarn.lock', 'packages/react-native-enriched-markdown/ios/**', 'packages/react-native-enriched-markdown/src/**', 'packages/core/cpp/**', 'apps/react-native-example/ios/**') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-ios-

      - name: Check turborepo cache for iOS
        run: |
          TURBO_CACHE_STATUS=$(yarn turbo run build:ios \
            --filter=react-native-enriched-markdown-example \
            --cache-dir="${{ env.TURBO_CACHE_DIR }}" \
            --dry=json | jq -r '.tasks[0].cache.status')

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Restore cocoapods
        if: env.turbo_cache_hit != 1
        id: cocoapods-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            **/ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('apps/react-native-example/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install cocoapods
        if: env.turbo_cache_hit != 1
        run: |
          cd apps/react-native-example/ios
          pod install
        env:
          NO_FLIPPER: 1

      - name: Cache cocoapods
        if: env.turbo_cache_hit != 1 && steps.cocoapods-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            **/ios/Pods
          key: ${{ steps.cocoapods-cache.outputs.cache-primary-key }}

      - name: Build example for iOS
        run: yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}"

  android-build:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      TURBO_CACHE_DIR: .turbo/android-native
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache turborepo for Android native
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-native-build-${{ hashFiles('yarn.lock', 'packages/android-enriched-markdown/**', 'apps/android-example/**', 'packages/core/cpp/**') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android-native-build-

      - name: Check turborepo cache for Android native build
        run: |
          TURBO_CACHE_STATUS=$(yarn turbo run build:android-native \
            --filter=enriched-markdown-android-example \
            --cache-dir="${{ env.TURBO_CACHE_DIR }}" \
            --dry=json | jq -r '.tasks[0].cache.status')

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Setup Android
        if: env.turbo_cache_hit != 1
        uses: ./.github/actions/setup-android
        with:
          gradle-wrapper-properties: apps/android-example/gradle/wrapper/gradle-wrapper.properties

      - name: Build Android example
        env:
          JAVA_OPTS: '-XX:MaxHeapSize=6g'
        run: yarn turbo run build:android-native --filter=enriched-markdown-android-example --cache-dir="${{ env.TURBO_CACHE_DIR }}"

  android-unit-tests:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      TURBO_CACHE_DIR: .turbo/android-native
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache turborepo for Android native tests
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-native-test-${{ hashFiles('yarn.lock', 'packages/android-enriched-markdown/**', 'packages/core/cpp/**') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android-native-test-

      - name: Check turborepo cache for Android native tests
        run: |
          TURBO_CACHE_STATUS=$(yarn turbo run test:android-native \
            --filter=@enriched-markdown/android \
            --cache-dir="${{ env.TURBO_CACHE_DIR }}" \
            --dry=json | jq -r '.tasks[0].cache.status')

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Setup Android
        if: env.turbo_cache_hit != 1
        uses: ./.github/actions/setup-android
        with:
          gradle-wrapper-properties: packages/android-enriched-markdown/gradle/wrapper/gradle-wrapper.properties

      - name: Run Android unit tests
        env:
          JAVA_OPTS: '-XX:MaxHeapSize=6g'
        run: yarn turbo run test:android-native --filter=@enriched-markdown/android --cache-dir="${{ env.TURBO_CACHE_DIR }}"

  android-kotlin-lint:
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      TURBO_CACHE_DIR: .turbo/android-native
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup
        uses: ./.github/actions/setup

      - name: Cache turborepo for Android native lint
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-native-lint-${{ hashFiles('yarn.lock', 'packages/android-enriched-markdown/**') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android-native-lint-

      - name: Check turborepo cache for Android native lint
        run: |
          TURBO_CACHE_STATUS=$(yarn turbo run lint:android-native \
            --filter=@enriched-markdown/android \
            --cache-dir="${{ env.TURBO_CACHE_DIR }}" \
            --dry=json | jq -r '.tasks[0].cache.status')

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Setup Android
        if: env.turbo_cache_hit != 1
        uses: ./.github/actions/setup-android
        with:
          gradle-wrapper-properties: packages/android-enriched-markdown/gradle/wrapper/gradle-wrapper.properties

      - name: Run Kotlin lint
        run: yarn turbo run lint:android-native --filter=@enriched-markdown/android --cache-dir="${{ env.TURBO_CACHE_DIR }}"

  ci-success:
    needs:
      - changes
      - rn-lint
      - rn-build-library
      - rn-build-android
      - rn-build-ios
      - android-build
      - android-unit-tests
      - android-kotlin-lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required checks
        env:
          REACT_NATIVE: ${{ needs.changes.outputs.react-native }}
          ANDROID: ${{ needs.changes.outputs.android }}
          RN_LINT: ${{ needs.rn-lint.result }}
          RN_BUILD_LIBRARY: ${{ needs.rn-build-library.result }}
          RN_BUILD_ANDROID: ${{ needs.rn-build-android.result }}
          RN_BUILD_IOS: ${{ needs.rn-build-ios.result }}
          ANDROID_BUILD: ${{ needs.android-build.result }}
          ANDROID_UNIT_TESTS: ${{ needs.android-unit-tests.result }}
          ANDROID_KOTLIN_LINT: ${{ needs.android-kotlin-lint.result }}
          CHANGES: ${{ needs.changes.result }}
        run: |
          if [[ "$CHANGES" != "success" ]]; then
            echo "changes job failed"
            exit 1
          fi

          check_required() {
            local flag=$1
            local result=$2
            local name=$3

            if [[ "$flag" == "true" && "$result" != "success" ]]; then
              echo "Required job $name has result $result (expected success)"
              exit 1
            fi
          }

          if [[ "$REACT_NATIVE" != "true" && "$ANDROID" != "true" ]]; then
            echo "No relevant changes detected - CI passed"
            exit 0
          fi

          check_required "$REACT_NATIVE" "$RN_LINT" "rn-lint"
          check_required "$REACT_NATIVE" "$RN_BUILD_LIBRARY" "rn-build-library"
          check_required "$REACT_NATIVE" "$RN_BUILD_ANDROID" "rn-build-android"
          check_required "$REACT_NATIVE" "$RN_BUILD_IOS" "rn-build-ios"
          check_required "$ANDROID" "$ANDROID_BUILD" "android-build"
          check_required "$ANDROID" "$ANDROID_UNIT_TESTS" "android-unit-tests"
          check_required "$ANDROID" "$ANDROID_KOTLIN_LINT" "android-kotlin-lint"

          echo "All required checks passed"
