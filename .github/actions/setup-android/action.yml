name: Setup Android
description: Install JDK, accept Android SDK licenses, and restore Gradle cache

inputs:
  gradle-wrapper-properties:
    description: Path to gradle-wrapper.properties used for the Gradle cache key
    required: true

runs:
  using: composite
  steps:
    - name: Configure Android SDK
      shell: bash
      run: |
        SDK_ROOT="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
        echo "ANDROID_HOME=${SDK_ROOT}" >> "$GITHUB_ENV"
        echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> "$GITHUB_ENV"

    - name: Install JDK
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        distribution: zulu
        java-version: '17'

    - name: Finalize Android SDK
      run: /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"
      shell: bash

    - name: Cache Gradle
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.gradle/wrapper
          ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles(inputs.gradle-wrapper-properties) }}
        restore-keys: |
          ${{ runner.os }}-gradle-
