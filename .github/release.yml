# Controls how GitHub's "Generate release notes" button groups merged PRs.
# Grouping is by label; the label-by-prefix workflow applies a `type: *`
# label to every PR based on its conventional-commit title prefix, so these
# categories line up with the prefixes (feat/fix/refactor/test/docs/chore).
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions
  categories:
    - title: New Features
      labels:
        - 'type: feature'
    - title: Fixes & Improvements
      labels:
        - 'type: fix'
    - title: Refactors
      labels:
        - 'type: refactor'
    - title: Tests
      labels:
        - 'type: test'
    - title: Docs & Chores
      labels:
        - 'type: docs'
        - 'type: chore'
    - title: Other Changes
      labels:
        - '*'
