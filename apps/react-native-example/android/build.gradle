buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    // RNRepo plugin classpath for CI builds (plugin applied in app/build.gradle).
    // To disable RNRepo support, set DISABLE_RNREPO environment variable to ANY value.
    def rnrepoClasspath = {
        def rnrepoDir = new File(
            providers.exec {
                workingDir(rootDir)
                commandLine("node", "--print", "require.resolve('@rnrepo/build-tools/package.json')")
            }.standardOutput.asText.get().trim()
        ).getParentFile().absolutePath
        return fileTree(dir: "${rnrepoDir}/gradle-plugin/build/libs", include: ["prebuilds-plugin.jar"])
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath rnrepoClasspath()
    }
}

plugins {
    id "org.jlleitschuh.gradle.ktlint" version "14.0.1" apply false
}

apply plugin: "com.facebook.react.rootproject"

subprojects { subproject ->
    if (subproject.name == "react-native-enriched-markdown") {
        subproject.apply plugin: "org.jlleitschuh.gradle.ktlint"
        subproject.ktlint {
            version = "1.8.0"
            debug = false
            verbose = true
            android = true
            outputToConsole = true
            ignoreFailures = false
            enableExperimentalRules = false
            filter {
                exclude("**/build/**")
                exclude("**/generated/**")
            }
        }
    }
}
