buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:2.4.0"
  }
}

plugins {
  id "com.android.library" apply false
  id "org.jetbrains.kotlin.plugin.compose" apply false
  id "com.gradleup.nmcp.aggregation" version "1.4.4"
  id "org.jlleitschuh.gradle.ktlint" version "14.1.0" apply false
}

nmcpAggregation {
  centralPortal {
    username = System.getenv("MAVEN_USERNAME") ?: ""
    password = System.getenv("MAVEN_PASSWORD") ?: ""
    publishingType = "USER_MANAGED"
  }
}

dependencies {
  nmcpAggregation project(":parser")
  nmcpAggregation project(":ui")
  nmcpAggregation project(":compose")
}

ext {
  buildToolsVersion = "36.0.0"
  minSdkVersion = 24
  compileSdkVersion = 36
  targetSdkVersion = 36
  ndkVersion = "28.2.13676358"
}

subprojects { subproject ->
  if (subproject.name !in ["parser", "ui", "compose"]) {
    return
  }

  subproject.plugins.withId("com.android.library") {
    subproject.apply plugin: "org.jlleitschuh.gradle.ktlint"
    subproject.apply from: "${rootProject.projectDir}/gradle/publish.gradle"
    subproject.ktlint {
      version = "1.8.0"
      debug = false
      verbose = true
      android = true
      outputToConsole = true
      ignoreFailures = false
      enableExperimentalRules = false
      filter {
        exclude("**/build/**")
        exclude("**/generated/**")
      }
    }
  }
}

tasks.register("clean", Delete) {
  delete rootProject.layout.buildDirectory
}
