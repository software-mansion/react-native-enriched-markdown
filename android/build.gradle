buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['EnrichedMarkdown_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["EnrichedMarkdown_" + name]).toInteger()
}

def enableMath = (rootProject.findProperty("enrichedMarkdown.enableMath") ?: findProperty("enrichedMarkdown.enableMath") ?: "true").toString().toBoolean()

android {
  namespace "com.swmansion.enriched.markdown"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    consumerProguardFiles "consumer-rules.pro"
    buildConfigField "boolean", "ENABLE_MATH", "${enableMath}"
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  packaging {
    jniLibs {
      // Android test APK builds merge native libraries from this module and
      // react-android. AndroidMath also ships libc++_shared.so, so keep a
      // single copy to avoid duplicate native library failures in Detox and
      // other instrumentation builds. Remove this workaround after migrating
      // away from AndroidMath if the new math backend does not package it.
      pickFirsts += ["**/libc++_shared.so"]
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      java.srcDirs += [
        "generated/java",
        "generated/jni"
      ]
      if (enableMath) {
        java.srcDirs += ["src/math/java"]
      }
    }
  }
}

repositories {
  mavenCentral()
  google()
  maven { url 'https://jitpack.io' }
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  // Baseline Profile installer for AOT compilation hints
  implementation "androidx.profileinstaller:profileinstaller:1.3.1"
  // LaTeX math rendering (optional — set enrichedMarkdown.enableMath=false in gradle.properties to exclude)
  if (enableMath) {
    implementation("com.github.gregcockroft:AndroidMath:v1.1.0") {
      exclude group: 'com.google.guava', module: 'guava'
    }
  }
}

react {
  jsRootDir = file("../src/")
  libraryName = "EnrichedMarkdownText"
  codegenJavaPackageName = "com.swmansion.enriched.markdown"
}
