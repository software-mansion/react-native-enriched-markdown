buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['EnrichedMarkdown_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["EnrichedMarkdown_" + name]).toInteger()
}

def enableMath = (rootProject.findProperty("enrichedMarkdown.enableMath") ?: findProperty("enrichedMarkdown.enableMath") ?: "true").toString().toBoolean()
def enableDataDetector = (rootProject.findProperty("enrichedMarkdown.enableDataDetector") ?: findProperty("enrichedMarkdown.enableDataDetector") ?: "false").toString().toBoolean()

android {
  namespace "com.swmansion.enriched.markdown"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    consumerProguardFiles "consumer-rules.pro"
    buildConfigField "boolean", "ENABLE_MATH", "${enableMath}"
    buildConfigField "boolean", "ENABLE_DATA_DETECTOR", "${enableDataDetector}"
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      java.srcDirs += [
        "generated/java",
        "generated/jni"
      ]
      if (enableMath) {
        java.srcDirs += ["src/math/java"]
      }
      if (enableDataDetector) {
        java.srcDirs += ["src/datadetector/java"]
      }
    }
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  // Baseline Profile installer for AOT compilation hints
  implementation "androidx.profileinstaller:profileinstaller:1.3.1"
  // LaTeX math rendering (optional — set enrichedMarkdown.enableMath=false in gradle.properties to exclude)
  if (enableMath) {
    implementation("io.github.erweixin:ratex-android:0.1.10")
  }
  // ML Kit Entity Extraction (optional — set enrichedMarkdown.enableDataDetector=true in gradle.properties)
  if (enableDataDetector) {
    implementation "com.google.mlkit:entity-extraction:16.0.0-beta6"
  }
}

react {
  jsRootDir = file("../src/")
  libraryName = "EnrichedMarkdownText"
  codegenJavaPackageName = "com.swmansion.enriched.markdown"
}
